<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gin Rummy">
<meta name="theme-color" content="#123524">
<style>
  :root{
    --felt:#123524;
    --felt-dark:#0a2418;
    --paper:#f5efe0;
    --paper-2:#ece3cc;
    --ink:#20261c;
    --ink-soft:#5b6154;
    --gold:#c6a15b;
    --gold-soft:#e3cd97;
    --red:#a3312f;
    --line:#c9bd9a;
    --radius:6px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--felt);
    background-image:
      radial-gradient(circle at 15% 0%, rgba(255,255,255,0.05), transparent 40%),
      repeating-linear-gradient(45deg, rgba(0,0,0,0.03) 0 2px, transparent 2px 6px);
    color:var(--ink);
    font-family:-apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    min-height:100%;
    padding-bottom:env(safe-area-inset-bottom);
  }
  #app{max-width:520px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column;}

  /* ---------- Header ---------- */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 16px 10px;
    color:var(--gold-soft);
  }
  .brand{
    font-family:Georgia, "Times New Roman", serif;
    font-weight:700; font-size:20px; letter-spacing:0.02em;
    color:var(--paper);
  }
  .brand small{display:block; font-family:-apple-system,sans-serif; font-weight:400; font-size:11px; color:var(--gold-soft); letter-spacing:0.08em; text-transform:uppercase; margin-top:1px;}
  .icon-btn{
    background:transparent; border:1px solid rgba(230,215,170,0.35); color:var(--gold-soft);
    border-radius:999px; width:34px; height:34px; font-size:16px;
    display:flex; align-items:center; justify-content:center;
  }
  .topbar-right{display:flex; align-items:center; gap:8px;}
  .version-badge{
    font-size:10.5px; font-weight:700; letter-spacing:0.03em; color:var(--gold-soft);
    border:1px solid rgba(230,215,170,0.35); border-radius:999px; padding:3px 9px;
  }

  .tabs{display:flex; gap:6px; padding:0 16px 12px;}
  .tab{
    flex:1; text-align:center; padding:8px 4px; font-size:12.5px; font-weight:600;
    letter-spacing:0.03em; color:var(--gold-soft); background:rgba(0,0,0,0.18);
    border:1px solid rgba(230,215,170,0.18); border-radius:999px;
  }
  .tab.active{background:var(--gold); color:var(--felt-dark); border-color:var(--gold);}

  /* ---------- Paper card ---------- */
  .sheet{
    background:var(--paper);
    background-image:linear-gradient(var(--paper-2) 1px, transparent 1px);
    background-size:100% 34px;
    border-radius:var(--radius) var(--radius) 0 0;
    flex:1;
    padding:18px 16px 28px;
    box-shadow:0 -6px 24px rgba(0,0,0,0.25);
  }
  h1,h2,h3{font-family:Georgia, "Times New Roman", serif; margin:0;}

  /* ---------- Setup screen ---------- */
  .setup-title{font-size:24px; color:var(--felt-dark); margin-bottom:2px;}
  .setup-sub{font-size:13px; color:var(--ink-soft); margin-bottom:20px;}
  .count-row{display:flex; gap:8px; margin-bottom:22px;}
  .count-btn{
    flex:1; padding:12px 0; border-radius:var(--radius); border:1.5px solid var(--line);
    background:#fff; font-size:18px; font-weight:700; color:var(--ink);
  }
  .count-btn.active{background:var(--felt); color:var(--gold-soft); border-color:var(--felt);}
  .name-row{display:flex; align-items:center; gap:10px; margin-bottom:10px;}
  .name-suit{width:22px; text-align:center; font-size:17px;}
  .name-row input{
    flex:1; padding:11px 12px; font-size:16px; border-radius:var(--radius);
    border:1.5px solid var(--line); background:#fff; color:var(--ink); font-family:inherit;
  }
  .primary-btn{
    width:100%; margin-top:18px; padding:14px 0; border:none; border-radius:var(--radius);
    background:var(--felt); color:var(--gold-soft); font-size:16px; font-weight:700; letter-spacing:0.02em;
  }
  .primary-btn:active{background:var(--felt-dark);}
  .dealer-label{font-size:13px; font-weight:700; color:var(--felt-dark); margin:20px 0 10px;}
  .dealer-row{display:flex; flex-wrap:wrap; gap:8px;}
  .dealer-btn{
    padding:9px 14px; border-radius:999px; border:1.5px solid var(--line); background:#fff;
    font-size:14px; font-weight:600; color:var(--ink);
  }
  .dealer-btn.active{background:var(--gold); border-color:var(--gold); color:var(--felt-dark);}
  .dealer-tag{
    display:inline-flex; align-items:center; gap:7px; font-size:16px; font-weight:800;
    color:var(--felt-dark); background:var(--gold-soft); border-radius:999px; padding:7px 16px 7px 12px; margin-bottom:16px;
  }
  .dealer-tag .dicon{font-size:20px; line-height:1;}
  .grid-dealer{display:block; font-size:10px; font-weight:500; color:var(--ink-soft);}
  .ghost-btn{
    width:100%; padding:12px 0; border-radius:var(--radius); border:1.5px solid var(--line);
    background:transparent; color:var(--ink-soft); font-size:14px; font-weight:600; margin-top:10px;
  }

  /* ---------- Round header ---------- */
  .round-dots{display:flex; gap:5px; overflow-x:auto; padding-bottom:14px; margin-bottom:8px; border-bottom:1px solid var(--line);}
  .round-dot{
    flex:0 0 auto; width:30px; height:30px; border-radius:50%; border:1.5px solid var(--line);
    background:#fff; font-size:12px; font-weight:700; color:var(--ink-soft);
    display:flex; align-items:center; justify-content:center;
  }
  .round-dot.current{background:var(--felt); color:var(--gold-soft); border-color:var(--felt);}
  .round-dot.done{border-color:var(--gold); color:var(--felt-dark); background:var(--gold-soft);}

  .round-header{display:flex; align-items:baseline; gap:10px; margin-bottom:4px;}
  .round-suit{font-size:26px; line-height:1;}
  .round-suit.red{color:var(--red);}
  .round-suit.black{color:var(--ink);}
  .round-num{font-size:12px; color:var(--ink-soft); letter-spacing:0.08em; text-transform:uppercase; font-weight:700;}
  .round-desc{font-size:16px; color:var(--felt-dark); margin:2px 0 18px; line-height:1.4;}

  /* ---------- Player score rows ---------- */
  .player-row{
    display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px dashed var(--line);
  }
  .player-name{flex:1; min-width:0;}
  .player-name .n{font-weight:700; font-size:15px; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .player-name .t{font-size:11.5px; color:var(--ink-soft); font-variant-numeric:tabular-nums;}
  .score-input{
    width:120px; height:44px; text-align:center; font-size:20px; font-weight:700;
    border-radius:var(--radius); border:1.5px solid var(--line); background:#fff; color:var(--ink);
    font-variant-numeric:tabular-nums; font-family:ui-monospace, "SF Mono", Menlo, monospace;
  }
  .score-input:focus{outline:2px solid var(--gold); border-color:var(--gold);}

  .nav-row{display:flex; gap:10px; margin-top:20px;}
  .nav-btn{
    flex:1; padding:13px 0; border-radius:var(--radius); border:1.5px solid var(--felt);
    background:transparent; color:var(--felt-dark); font-weight:700; font-size:14px;
  }
  .nav-btn.next{background:var(--felt); color:var(--gold-soft);}

  /* ---------- Standings strip (mini, on play screen) ---------- */
  .standings-strip{display:flex; flex-direction:column; gap:8px; margin-top:20px; padding-top:14px; border-top:1px solid var(--line);}
  .standings-strip .label{font-size:11px; text-transform:uppercase; letter-spacing:0.08em; color:var(--ink-soft); font-weight:700; margin-bottom:4px;}
  .srow{display:flex; align-items:center; gap:9px; font-size:17px;}
  .srow .pos{width:18px; color:var(--ink-soft); font-weight:700; font-size:13px;}
  .srow .nm{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:600;}
  .srow .tv{font-weight:800; font-size:18px; font-variant-numeric:tabular-nums; font-family:ui-monospace, "SF Mono", Menlo, monospace;}
  .srow .star{color:var(--gold); font-size:16px; flex:0 0 auto;}
  .srow.lead .nm, .srow.lead .tv{color:var(--felt-dark);}
  .srow.lead .pos{color:var(--gold);}

  /* ---------- Grid screen ---------- */
  .grid-wrap{overflow-x:auto; margin:0 -16px; padding:0 16px;}
  table.score-grid{border-collapse:collapse; width:100%; font-size:12.5px;}
  table.score-grid th, table.score-grid td{
    padding:7px 8px; text-align:center; border-bottom:1px solid var(--line); white-space:nowrap;
  }
  table.score-grid th{color:var(--ink-soft); font-weight:700; font-size:11px;}
  table.score-grid td.rd{text-align:left; color:var(--ink-soft); font-weight:600;}
  table.score-grid td.val{font-family:ui-monospace, "SF Mono", Menlo, monospace; font-variant-numeric:tabular-nums;}
  table.score-grid td.val.cur-round{background:rgba(198,161,91,0.18);}
  table.score-grid tr.total-row td{border-top:2px solid var(--felt); border-bottom:none; font-weight:800; padding-top:10px;}
  .neg-val{color:var(--red);}

  /* ---------- Summary screen ---------- */
  .winner-card{
    background:linear-gradient(135deg, var(--felt), var(--felt-dark));
    border-radius:var(--radius); padding:20px 18px; margin-bottom:20px; text-align:center;
    box-shadow:0 6px 18px rgba(0,0,0,0.25);
  }
  .winner-card .wk{font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--gold-soft); font-weight:700;}
  .winner-card .wn{font-family:Georgia,serif; font-size:26px; color:var(--paper); margin:4px 0 2px;}
  .winner-card .wt{font-size:13px; color:var(--gold-soft);}
  .final-row{
    display:flex; align-items:center; gap:10px; padding:12px 4px; border-bottom:1px solid var(--line);
  }
  .final-row .rank{
    width:26px; height:26px; border-radius:50%; background:var(--felt); color:var(--gold-soft);
    font-size:12px; font-weight:800; display:flex; align-items:center; justify-content:center; flex:0 0 auto;
  }
  .final-row:first-child .rank{background:var(--gold); color:var(--felt-dark);}
  .final-row .fn{flex:1; font-weight:700; font-size:15px;}
  .final-row .ft{font-size:17px; font-weight:800; font-family:ui-monospace, "SF Mono", Menlo, monospace;}
  .export-row{display:flex; gap:10px; margin-top:20px;}
  .export-row .primary-btn, .export-row .ghost-btn{margin-top:0;}

  /* ---------- History ---------- */
  .empty-hist{font-size:14px; color:var(--ink-soft); line-height:1.5; padding:20px 0;}
  .hist-item{
    border:1.5px solid var(--line); border-radius:var(--radius); padding:12px 14px; margin-bottom:10px; background:#fffdf8;
  }
  .hi-date{font-size:11.5px; color:var(--ink-soft); font-weight:700; text-transform:uppercase; letter-spacing:0.04em;}
  .hi-row{margin:4px 0 2px;}
  .hi-players{font-size:15px; font-weight:700; color:var(--ink);}
  .hi-winner{font-size:13.5px; color:var(--felt-dark); font-weight:600;}
  .hr-list{margin-top:6px;}
  .hr-row{display:flex; align-items:flex-start; gap:10px; padding:10px 0; border-bottom:1px dashed var(--line);}
  .hr-suit{font-size:18px; line-height:1.3;}
  .hr-suit.red{color:var(--red);} .hr-suit.black{color:var(--ink);}
  .hr-desc{flex:1; font-size:13.5px; color:var(--ink); line-height:1.35;}
  .hr-dealer{display:block; font-size:11px; color:var(--ink-soft); margin-top:2px;}
  .hr-val{font-weight:800; font-size:16px; font-family:ui-monospace, "SF Mono", Menlo, monospace;}
</style>
</head>
<body>
<div id="app"></div>

<script>
(function(){
  "use strict";
  var STORAGE_KEY = "ginrummy_scorecard_v1";

  var ROUNDS = [
    "Två triss (tretal)",
    "En triss (tretal) + en stege på fyra kort",
    "Tre triss",
    "Två stegar på fyra kort",
    "En stege på fem kort + två triss (tretal)",
    "Fyra triss (tretal)",
    "Två stegar på fyra kort + ett triss (tretal)",
    "Ett fyrtal + en stege på fem kort",
    "Två stegar på fem kort",
    "Ett femtal + två stegar på fyra kort",
    "Tre stegar på fyra kort",
    "Två fyrtal + ett triss (tretal)",
    "Ett femtal + ett triss (tretal) + ett par (paret får ej byggas på)",
    "En stege på fem kort + två fyrtal",
    "Två triss (tretal) + resterande kort i svit (stege)"
  ];
  var SUITS = ["♠","♥","♦","♣"];
  var APP_VERSION = "1.4";
  function suitFor(i){ return SUITS[i % 4]; }
  function suitColor(s){ return (s === "♥" || s === "♦") ? "red" : "black"; }

  function renderTopbar(subtitle, rightHtml){
    return '<div class="topbar"><div class="brand">Gin Rummy'+
      '<small>'+subtitle+'</small></div>'+
      '<div class="topbar-right"><span class="version-badge">v'+APP_VERSION+'</span>'+(rightHtml||'')+'</div></div>';
  }

  var state = loadState() || defaultState([]);

  function defaultState(existingHistory){
    return { screen:"setup", players:[], cells:{}, currentRound:0, setupCount:4, history: existingHistory || [] };
  }
  function loadState(){
    try{
      var raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return null;
      var s = JSON.parse(raw);
      if(!s || !s.players) return null;
      if(!s.history) s.history = [];
      return s;
    }catch(e){ return null; }
  }
  function save(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){}
  }

  function cellKey(pid, r){ return pid + "_" + r; }
  function cellValue(g, pid, r){
    var c = g.cells[cellKey(pid,r)];
    if(!c || c.mag === null || c.mag === undefined || c.mag === "") return null;
    var m = Math.abs(Number(c.mag));
    return c.neg ? -m : m;
  }
  function total(g, pid){
    var sum = 0;
    for(var r=0;r<15;r++){
      var v = cellValue(g, pid, r);
      if(v !== null) sum += v;
    }
    return sum;
  }
  function standingsSorted(g){
    return g.players.slice().sort(function(a,b){ return total(g,a.id) - total(g,b.id); });
  }
  function dealerForRound(g, r){
    if(!g.players.length) return null;
    var idx = ((g.dealerStartIndex || 0) + r) % g.players.length;
    return g.players[idx];
  }
  function roundComplete(g, r){
    return g.players.every(function(p){ return cellValue(g, p.id, r) !== null; });
  }
  function allComplete(g){
    for(var r=0;r<15;r++){ if(!roundComplete(g, r)) return false; }
    return true;
  }
  function hasAnyScore(g){
    for(var r=0;r<15;r++){
      for(var i=0;i<g.players.length;i++){
        if(cellValue(g, g.players[i].id, r) !== null) return true;
      }
    }
    return false;
  }
  function archiveCurrentGame(hist){
    hist = hist || [];
    if(state.players.length > 0 && hasAnyScore(state)){
      hist = hist.slice();
      hist.unshift({
        id:"g" + Date.now(),
        date:new Date().toISOString(),
        players:state.players.slice(),
        cells:JSON.parse(JSON.stringify(state.cells)),
        dealerStartIndex:state.dealerStartIndex || 0
      });
      if(hist.length > 30) hist = hist.slice(0,30);
    }
    return hist;
  }

  function fmt(v){ return v === null ? "–" : String(v); }

  var app = document.getElementById("app");

  function render(){
    if(state.screen !== "setup" && state.screen !== "history" && state.players.length === 0){
      state.screen = "setup";
    }
    if(state.screen === "setup") app.innerHTML = renderSetup();
    else if(state.screen === "play") app.innerHTML = renderPlay();
    else if(state.screen === "grid") app.innerHTML = renderGrid();
    else if(state.screen === "summary") app.innerHTML = renderSummary();
    else if(state.screen === "history") app.innerHTML = renderHistory();
    else if(state.screen === "historyDetail") app.innerHTML = renderHistoryDetail();
  }

  /* ---------------- SETUP ---------------- */
  function renderSetup(){
    var count = state.setupCount || 4;
    var names = state._setupNames || [];
    var countBtns = "";
    for(var n=2;n<=5;n++){
      countBtns += '<button class="count-btn'+(n===count?' active':'')+'" data-action="setcount" data-n="'+n+'">'+n+'</button>';
    }
    var nameRows = "";
    for(var i=0;i<count;i++){
      var val = names[i] ? escapeAttr(names[i]) : "";
      nameRows += '<div class="name-row">'+
        '<span class="name-suit '+suitColor(suitFor(i))+'">'+suitFor(i)+'</span>'+
        '<input type="text" maxlength="18" data-action="namefield" data-i="'+i+'" placeholder="Spelare '+(i+1)+'" value="'+val+'">'+
        '</div>';
    }
    var dealerIdx = (state._setupDealer !== undefined && state._setupDealer < count) ? state._setupDealer : 0;
    var dealerBtns = "";
    for(var d=0; d<count; d++){
      var dnm = (names[d] && names[d].trim()) ? escapeHtml(names[d].trim()) : ("Spelare "+(d+1));
      dealerBtns += '<button class="dealer-btn'+(d===dealerIdx?' active':'')+'" data-action="setdealer" data-i="'+d+'">'+dnm+'</button>';
    }
    return ''+
      renderTopbar("Scorekort · 15 omgångar")+
      '<div class="sheet">'+
        '<div class="setup-title">Nytt spel</div>'+
        '<div class="setup-sub">Välj antal spelare och namn.</div>'+
        '<div class="count-row">'+countBtns+'</div>'+
        nameRows+
        '<div class="dealer-label">Vem ger i första omgången?</div>'+
        '<div class="dealer-row">'+dealerBtns+'</div>'+
        '<div style="font-size:12px;color:var(--ink-soft);margin-top:8px;">Giver-turen flyttas sedan ett steg åt gången genom alla 15 omgångar.</div>'+
        '<button class="primary-btn" data-action="start">Starta spel</button>'+
        (state.history && state.history.length ? '<button class="ghost-btn" data-action="tab" data-tab="history">Visa historik ('+state.history.length+')</button>' : '')+
      '</div>';
  }

  function escapeAttr(s){ return String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;"); }
  function escapeHtml(s){ return escapeAttr(s); }

  /* ---------------- PLAY ---------------- */
  function renderPlay(){
    var r = state.currentRound;
    var dots = "";
    for(var i=0;i<15;i++){
      var cls = "round-dot";
      if(i === r) cls += " current";
      else if(roundComplete(state, i)) cls += " done";
      dots += '<div class="'+cls+'" data-action="gotoround" data-r="'+i+'">'+(i+1)+'</div>';
    }
    var sc = suitFor(r), scc = suitColor(sc);

    // Poäng börjar på 0 för alla spelare i omgången tills man skriver in något annat
    state.players.forEach(function(p){
      var k = cellKey(p.id, r);
      if(!state.cells[k] || state.cells[k].mag === null || state.cells[k].mag === undefined){
        state.cells[k] = { mag:0 };
      }
    });
    save();

    var rows = "";
    state.players.forEach(function(p){
      var c = state.cells[cellKey(p.id, r)];
      var magVal = c.mag;
      var tot = total(state, p.id);
      rows += '<div class="player-row">'+
        '<div class="player-name"><div class="n">'+escapeHtml(p.name)+'</div><div class="t" id="total-'+p.id+'">Totalt: '+fmt(tot)+'</div></div>'+
        '<input class="score-input" type="text" inputmode="numeric" pattern="[0-9]*" '+
          'data-action="scoreinput" data-pid="'+p.id+'" data-r="'+r+'" value="'+magVal+'" onfocus="this.select()">'+
        '</div>';
    });

    return ''+
      renderTopbar("Omgång "+(r+1)+" av 15", '<button class="icon-btn" data-action="newgame" title="Nytt spel">↺</button>')+
      renderTabs("play")+
      '<div class="sheet">'+
        '<div class="round-dots">'+dots+'</div>'+
        '<div class="round-header"><span class="round-suit '+scc+'">'+sc+'</span><span class="round-num">Omgång '+(r+1)+'</span></div>'+
        '<div class="round-desc">'+ROUNDS[r]+'</div>'+
        '<div class="dealer-tag"><span class="dicon">🂠</span> Delare: '+escapeHtml(dealerForRound(state, r).name)+'</div>'+
        rows+
        '<div class="nav-row">'+
          '<button class="nav-btn" data-action="prevround"'+(r===0?' disabled style="opacity:0.4"':'')+'>‹ Föregående</button>'+
          '<button class="nav-btn next" data-action="nextround">'+(r===14?'Till slutställning':'Nästa omgång ›')+'</button>'+
        '</div>'+
        '<div class="standings-strip" id="standings-strip">'+renderStandingsStrip()+'</div>'+
      '</div>';
  }

  function renderStandingsStrip(){
    var sorted = standingsSorted(state);
    var html = '<div class="label">Ställning just nu (lägst vinner)</div>';
    sorted.forEach(function(p, idx){
      html += '<div class="srow'+(idx===0?' lead':'')+'"><span class="pos">'+(idx+1)+'</span><span class="nm">'+escapeHtml(p.name)+(idx===0?' <span class="star">★</span>':'')+'</span><span class="tv">'+fmt(total(state, p.id))+'</span></div>';
    });
    return html;
  }

  function renderTabs(active){
    function t(id,label){ return '<div class="tab'+(active===id?' active':'')+'" data-action="tab" data-tab="'+id+'">'+label+'</div>'; }
    return '<div class="tabs">'+t("play","Spela")+t("grid","Scorekort")+t("summary","Resultat")+t("history","Historik")+'</div>';
  }

  /* ---------------- GRID ---------------- */
  function renderGrid(){
    var head = "<tr><th style='text-align:left'>Omgång</th>";
    state.players.forEach(function(p){ head += "<th>"+escapeHtml(p.name)+"</th>"; });
    head += "</tr>";

    var body = "";
    for(var r=0;r<15;r++){
      var cur = (r === state.currentRound);
      body += "<tr>";
      body += "<td class='rd'>"+(r+1)+". "+suitFor(r)+"<span class='grid-dealer'>"+escapeHtml(dealerForRound(state, r).name)+"</span></td>";
      state.players.forEach(function(p){
        var v = cellValue(state, p.id, r);
        var cls = "val" + (cur ? " cur-round" : "") + (v !== null && v < 0 ? " neg-val" : "");
        body += "<td class='"+cls+"' data-action='gridcell' data-r='"+r+"'>"+fmt(v)+"</td>";
      });
      body += "</tr>";
    }
    var totRow = "<tr class='total-row'><td class='rd'>Totalt</td>";
    state.players.forEach(function(p){
      var t = total(state, p.id);
      totRow += "<td class='val"+(t<0?" neg-val":"")+"'>"+fmt(t)+"</td>";
    });
    totRow += "</tr>";

    return ''+
      renderTopbar("Fullständigt scorekort", '<button class="icon-btn" data-action="newgame" title="Nytt spel">↺</button>')+
      renderTabs("grid")+
      '<div class="sheet">'+
        '<div class="grid-wrap"><table class="score-grid">'+head+body+totRow+'</table></div>'+
        '<div style="font-size:12px;color:var(--ink-soft);margin-top:14px;">Tryck på en ruta för att hoppa till den omgången och redigera.</div>'+
      '</div>';
  }

  /* ---------------- SUMMARY ---------------- */
  function renderSummary(){
    var sorted = standingsSorted(state);
    var done = allComplete(state);
    var winner = sorted[0];
    var rows = "";
    sorted.forEach(function(p, idx){
      rows += '<div class="final-row"><div class="rank">'+(idx+1)+'</div><div class="fn">'+escapeHtml(p.name)+'</div><div class="ft'+(total(state,p.id)<0?'" style="color:var(--red)':'')+'">'+fmt(total(state,p.id))+'</div></div>';
    });
    return ''+
      renderTopbar("Resultat", '<button class="icon-btn" data-action="newgame" title="Nytt spel">↺</button>')+
      renderTabs("summary")+
      '<div class="sheet">'+
        '<div class="winner-card">'+
          '<div class="wk">'+(done? "Spelet är klart":"Ställning just nu")+'</div>'+
          '<div class="wn">'+escapeHtml(winner ? winner.name : "–")+'</div>'+
          '<div class="wt">'+(winner? fmt(total(state,winner.id))+" poäng · lägst vinner":"")+'</div>'+
        '</div>'+
        rows+
        '<div class="export-row">'+
          '<button class="primary-btn" data-action="share">Dela resultat</button>'+
          '<button class="ghost-btn" data-action="copy">Kopiera</button>'+
        '</div>'+
      '</div>';
  }

  /* ---------------- HISTORY (list) ---------------- */
  function formatDate(iso){
    try{
      var d = new Date(iso);
      return d.toLocaleDateString("sv-SE", {day:"numeric", month:"short", year:"numeric"}) + " · " +
             d.toLocaleTimeString("sv-SE", {hour:"2-digit", minute:"2-digit"});
    }catch(e){ return ""; }
  }
  function renderHistory(){
    var hist = state.history || [];
    var items = "";
    if(hist.length === 0){
      items = '<div class="empty-hist">Inga sparade spel än.<br>När du trycker på ↺ Nytt spel sparas det avslutade spelet här.</div>';
    } else {
      hist.forEach(function(g){
        var w = standingsSorted(g)[0];
        items += '<div class="hist-item" data-action="openhistory" data-id="'+g.id+'">'+
          '<div class="hi-date">'+formatDate(g.date)+'</div>'+
          '<div class="hi-row"><span class="hi-players">'+g.players.map(function(p){return escapeHtml(p.name);}).join(", ")+'</span></div>'+
          '<div class="hi-winner">🏆 '+ (w? escapeHtml(w.name)+" · "+fmt(total(g,w.id)) : "–") +'</div>'+
        '</div>';
      });
    }
    return ''+
      renderTopbar("Historik", '<button class="icon-btn" data-action="newgame" title="Nytt spel">↺</button>')+
      renderTabs("history")+
      '<div class="sheet">'+
        '<div class="setup-title" style="font-size:19px;">Tidigare spel</div>'+
        '<div class="setup-sub">Tryck på ett spel för att se varje spelares omgångar.</div>'+
        items+
      '</div>';
  }

  /* ---------------- HISTORY DETAIL ---------------- */
  function renderHistoryDetail(){
    var g = (state.history || []).find(function(h){ return h.id === state.historyViewId; });
    if(!g){
      state.screen = "history";
      return renderHistory();
    }
    var sorted = standingsSorted(g);
    var winner = sorted[0];
    var pid = state.historyPlayerId && g.players.some(function(p){return p.id===state.historyPlayerId;}) ? state.historyPlayerId : winner.id;

    var finalRows = "";
    sorted.forEach(function(p, idx){
      finalRows += '<div class="final-row"><div class="rank">'+(idx+1)+'</div><div class="fn">'+escapeHtml(p.name)+'</div><div class="ft'+(total(g,p.id)<0?'" style="color:var(--red)':'')+'">'+fmt(total(g,p.id))+'</div></div>';
    });

    var pickerBtns = "";
    g.players.forEach(function(p){
      pickerBtns += '<button class="dealer-btn'+(p.id===pid?' active':'')+'" data-action="pickhistoryplayer" data-pid="'+p.id+'">'+escapeHtml(p.name)+'</button>';
    });

    var roundRows = "";
    for(var r=0;r<15;r++){
      var sc = suitFor(r), scc = suitColor(sc);
      var v = cellValue(g, pid, r);
      roundRows += '<div class="hr-row">'+
        '<span class="hr-suit '+scc+'">'+sc+'</span>'+
        '<span class="hr-desc">'+ROUNDS[r]+'<span class="hr-dealer">Delade: '+escapeHtml(dealerForRound(g,r).name)+'</span></span>'+
        '<span class="hr-val'+(v!==null && v<0 ? ' neg-val':'')+'">'+fmt(v)+'</span>'+
      '</div>';
    }

    return ''+
      renderTopbar(formatDate(g.date), '<button class="icon-btn" data-action="deletehistory" data-id="'+g.id+'" title="Radera">🗑</button>')+
      '<div class="sheet">'+
        '<button class="ghost-btn" style="margin-top:0;margin-bottom:16px;" data-action="backtohistory">‹ Till historik</button>'+
        '<div class="winner-card">'+
          '<div class="wk">Slutställning</div>'+
          '<div class="wn">'+escapeHtml(winner.name)+'</div>'+
          '<div class="wt">'+fmt(total(g,winner.id))+' poäng · lägst vinner</div>'+
        '</div>'+
        finalRows+
        '<div class="dealer-label">Se en spelares omgångar</div>'+
        '<div class="dealer-row" style="margin-bottom:14px;">'+pickerBtns+'</div>'+
        '<div class="hr-list">'+roundRows+'</div>'+
      '</div>';
  }

  /* ---------------- Export text ---------------- */
  function buildExportText(){
    var lines = [];
    lines.push("Gin Rummy – Scorekort");
    lines.push(new Date().toLocaleDateString("sv-SE"));
    lines.push("");
    for(var r=0;r<15;r++){
      var parts = [(r+1)+". "+ROUNDS[r]+" (delare: "+dealerForRound(state, r).name+")"];
      state.players.forEach(function(p){
        parts.push(p.name+": "+fmt(cellValue(state, p.id, r)));
      });
      lines.push(parts.join(" | "));
    }
    lines.push("");
    lines.push("SLUTSTÄLLNING (lägst vinner):");
    standingsSorted(state).forEach(function(p, idx){
      lines.push((idx+1)+". "+p.name+" — "+fmt(total(state, p.id)));
    });
    return lines.join("\n");
  }

  /* ---------------- Event handling ---------------- */
  app.addEventListener("click", function(e){
    var el = e.target.closest("[data-action]");
    if(!el) return;
    var action = el.getAttribute("data-action");

    if(action === "setcount"){
      state.setupCount = Number(el.getAttribute("data-n"));
      render();
    }
    else if(action === "start"){
      var count = state.setupCount || 4;
      var names = state._setupNames || [];
      var players = [];
      for(var i=0;i<count;i++){
        var nm = (names[i] || "").trim() || ("Spelare "+(i+1));
        players.push({ id:"p"+(i+1)+"_"+Date.now()+i, name:nm });
      }
      state.players = players;
      state.cells = {};
      state.currentRound = 0;
      state.dealerStartIndex = (state._setupDealer !== undefined && state._setupDealer < count) ? state._setupDealer : 0;
      state.screen = "play";
      save();
      render();
    }
    else if(action === "setdealer"){
      state._setupDealer = Number(el.getAttribute("data-i"));
      render();
    }
    else if(action === "tab"){
      state.screen = el.getAttribute("data-tab");
      save();
      render();
    }
    else if(action === "gotoround"){
      state.currentRound = Number(el.getAttribute("data-r"));
      save();
      render();
    }
    else if(action === "prevround"){
      state.currentRound = Math.max(0, state.currentRound - 1);
      save();
      render();
    }
    else if(action === "nextround"){
      if(state.currentRound < 14){ state.currentRound += 1; save(); render(); }
      else { state.screen = "summary"; save(); render(); }
    }
    else if(action === "gridcell"){
      state.currentRound = Number(el.getAttribute("data-r"));
      state.screen = "play";
      save();
      render();
    }
    else if(action === "openhistory"){
      state.historyViewId = el.getAttribute("data-id");
      state.historyPlayerId = null;
      state.screen = "historyDetail";
      save();
      render();
    }
    else if(action === "backtohistory"){
      state.screen = "history";
      save();
      render();
    }
    else if(action === "pickhistoryplayer"){
      state.historyPlayerId = el.getAttribute("data-pid");
      render();
    }
    else if(action === "deletehistory"){
      if(confirm("Radera det här sparade spelet? Går inte att ångra.")){
        var did = el.getAttribute("data-id");
        state.history = (state.history || []).filter(function(h){ return h.id !== did; });
        state.screen = "history";
        save();
        render();
      }
    }
    else if(action === "newgame"){
      if(confirm("Starta ett nytt spel? Det pågående spelet sparas i historiken.")){
        var hist = archiveCurrentGame(state.history);
        state = defaultState(hist);
        save();
        render();
      }
    }
    else if(action === "share" || action === "copy"){
      var text = buildExportText();
      if(action === "share" && navigator.share){
        navigator.share({ title:"Gin Rummy – Scorekort", text:text }).catch(function(){});
      } else if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(text).then(function(){
          toast("Kopierat till urklipp");
        }).catch(function(){ fallbackDownload(text); });
      } else {
        fallbackDownload(text);
      }
    }
  });

  app.addEventListener("input", function(e){
    var el = e.target;
    var action = el.getAttribute && el.getAttribute("data-action");

    if(action === "namefield"){
      var i = Number(el.getAttribute("data-i"));
      if(!state._setupNames) state._setupNames = [];
      state._setupNames[i] = el.value;
      var dbtn = app.querySelector('.dealer-btn[data-i="'+i+'"]');
      if(dbtn) dbtn.textContent = el.value.trim() || ("Spelare "+(i+1));
    }
    else if(action === "scoreinput"){
      var digits = el.value.replace(/[^0-9]/g, "");
      el.value = digits;
      var pid = el.getAttribute("data-pid"), r = el.getAttribute("data-r");
      var key = cellKey(pid, r);
      var c = state.cells[key] || {mag:null};
      c.mag = digits === "" ? null : Number(digits);
      state.cells[key] = c;
      save();
      refreshTotals();
    }
  });

  function refreshTotals(){
    state.players.forEach(function(p){
      var el = document.getElementById("total-"+p.id);
      if(el) el.textContent = "Totalt: " + fmt(total(state, p.id));
    });
    var strip = document.getElementById("standings-strip");
    if(strip) strip.innerHTML = renderStandingsStrip();
  }

  function fallbackDownload(text){
    var blob = new Blob([text], {type:"text/plain"});
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "ginrummy-scorekort.txt";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 2000);
  }

  var toastTimer = null;
  function toast(msg){
    var t = document.createElement("div");
    t.textContent = msg;
    t.style.cssText = "position:fixed;left:50%;bottom:30px;transform:translateX(-50%);"+
      "background:var(--felt-dark);color:#fff;padding:10px 18px;border-radius:999px;font-size:13px;z-index:999;box-shadow:0 4px 14px rgba(0,0,0,0.3);";
    document.body.appendChild(t);
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ t.remove(); }, 1800);
  }

  render();
})();
</script>
</body>
</html>
